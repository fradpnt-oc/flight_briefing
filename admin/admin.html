<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Briefing Admin</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E"/>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #e8eaf0;
  --muted: #7b82a0;
  --accent: #4f8ef7;
  --accent2: #3d6fd4;
  --green: #34c97a;
  --red: #f05c5c;
  --amber: #f0a83c;
  --radius: 14px;
  --radius-sm: 8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, 'SF Pro Text', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,17,23,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 16px 20px 0;
  border-bottom: 1px solid var(--border);
}
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.header-icon { font-size: 22px; }
.header-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.header-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

/* Tabs */
.tabs { display: flex; gap: 0; }
.tab {
  flex: 1; padding: 10px 4px; text-align: center;
  font-size: 13px; font-weight: 600; color: var(--muted);
  border-bottom: 2px solid transparent;
  cursor: pointer; transition: all .2s; letter-spacing: .3px;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Content */
.content { padding: 20px 16px; max-width: 600px; margin: 0 auto; }
.section { display: none; }
.section.active { display: block; }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
}
.card-header {
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.card-title { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; }
.card-badge {
  font-size: 11px; font-weight: 700; padding: 2px 7px;
  border-radius: 20px; background: var(--surface2); color: var(--muted);
  letter-spacing: .5px; text-transform: uppercase;
}
.card-badge.icao { background: rgba(79,142,247,0.15); color: var(--accent); }
.chevron { color: var(--muted); font-size: 12px; transition: transform .2s; }
.card.open .chevron { transform: rotate(180deg); }
.card-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
.card.open .card-body { display: block; }

/* Info row */
.info-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--muted); }
.info-val { font-weight: 500; }

/* Runway rows */
.runway-row {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 10px 12px; margin-top: 8px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px;
  font-size: 13px;
}
.runway-row .rw-num { font-weight: 700; color: var(--accent); grid-column: 1/-1; font-size: 14px; }

/* Add form */
.add-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}
.form-title { font-weight: 700; font-size: 14px; margin-bottom: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 600; letter-spacing: .3px; text-transform: uppercase; }
.field input, .field select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); padding: 11px 13px;
  color: var(--text); font-size: 15px; outline: none;
  -webkit-appearance: none; appearance: none;
  transition: border-color .15s;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--muted); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Runway builder */
.runway-builder { margin-top: 4px; }
.runway-entry {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 12px; margin-bottom: 8px;
  border: 1px solid var(--border);
}
.runway-entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.runway-entry-title { font-weight: 600; font-size: 13px; color: var(--accent); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 20px; border-radius: var(--radius-sm); border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all .15s; letter-spacing: .2px;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--accent); color: #fff; width: 100%; padding: 14px; border-radius: var(--radius-sm); font-size: 15px; }
.btn-primary:hover { background: var(--accent2); }
.btn-sm { padding: 7px 13px; font-size: 13px; }
.btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--border2); }
.btn-danger { background: rgba(240,92,92,0.12); color: var(--red); border: 1px solid rgba(240,92,92,0.2); }
.btn-danger:hover { background: rgba(240,92,92,0.2); }
.btn-add { background: rgba(79,142,247,0.1); color: var(--accent); border: 1px solid rgba(79,142,247,0.2); }
.btn-add:hover { background: rgba(79,142,247,0.2); }
.btn-full { width: 100%; margin-top: 8px; }

/* Section header */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-count { font-size: 13px; color: var(--muted); }

/* Toast */
.toast {
  position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 30px; padding: 10px 20px;
  font-size: 14px; font-weight: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  z-index: 999; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok { color: var(--green); }
.toast.err { color: var(--red); }

/* Empty state */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* Divider */
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* Delete button in card */
.card-actions { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="header-icon">✈️</span>
    <div>
      <div class="header-title">Briefing Admin</div>
      <div class="header-sub">Airports, Passengers &amp; Aircraft</div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('airports')">Airports</div>
    <div class="tab" onclick="showTab('passengers')">Passengers</div>
    <div class="tab" onclick="showTab('aircraft')">Aircraft</div>
  </div>
</div>

<!-- AIRPORTS -->
<div class="content">
<div id="sec-airports" class="section active">

  <div id="airport-add" style="display:none" class="add-form">
    <div class="form-title">Add / Edit Airport</div>
    <div class="field">
      <label>ICAO Code</label>
      <input id="a-icao" type="text" placeholder="EDFE" maxlength="4"
        style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"/>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Elevation (ft)</label>
        <input id="a-elev" type="number" placeholder="385"/>
      </div>
      <div class="field">
        <label>Name (optional)</label>
        <input id="a-name" type="text" placeholder="Egelsbach"/>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Latitude</label>
        <input id="a-lat" type="number" step="0.0001" placeholder="49.9597"/>
      </div>
      <div class="field">
        <label>Longitude</label>
        <input id="a-lon" type="number" step="0.0001" placeholder="8.6456"/>
      </div>
    </div>

    <hr class="divider"/>
    <div class="form-title">Runways</div>
    <div id="runway-list" class="runway-builder"></div>
    <button class="btn btn-add btn-full" onclick="addRunwayField()">+ Add Runway</button>
    <hr class="divider"/>
    <button class="btn btn-primary" onclick="saveAirport()">Save Airport</button>
    <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="toggleAirportForm(false)">Cancel</button>
  </div>

  <div class="section-header">
    <span class="section-count" id="airport-count"></span>
    <button class="btn btn-add btn-sm" onclick="toggleAirportForm(true)">+ Add</button>
  </div>

  <div id="airport-list"></div>
</div>

<!-- PASSENGERS -->
<div id="sec-passengers" class="section">

  <div id="pax-add" style="display:none" class="add-form">
    <div class="form-title">Add / Edit Passenger</div>
    <div class="field">
      <label>Name</label>
      <input id="p-name" type="text" placeholder="Eric"/>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Weight (kg)</label>
        <input id="p-weight" type="number" step="0.5" placeholder="68"/>
      </div>
      <div class="field">
        <label>Height (cm)</label>
        <input id="p-height" type="number" step="1" placeholder="180"/>
      </div>
    </div>
    <button class="btn btn-primary" onclick="savePassenger()">Save Passenger</button>
    <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="togglePaxForm(false)">Cancel</button>
  </div>

  <div class="section-header">
    <span class="section-count" id="pax-count"></span>
    <button class="btn btn-add btn-sm" onclick="togglePaxForm(true)">+ Add</button>
  </div>

  <div id="pax-list"></div>
</div>

<!-- AIRCRAFT -->
<div id="sec-aircraft" class="section">

  <div id="ac-add" style="display:none" class="add-form">
    <div class="form-title" id="ac-form-title">Add Aircraft</div>

    <!-- Common fields -->
    <div class="field">
      <label>Code <span style="color:var(--muted);font-weight:400;text-transform:none">(unique ID, e.g. my_plane_100)</span></label>
      <input id="ac-code" type="text" placeholder="my_plane_100"/>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Display Name</label>
        <input id="ac-name" type="text" placeholder="My Plane 100"/>
      </div>
      <div class="field">
        <label>Type</label>
        <select id="ac-type" onchange="onAcTypeChange()">
          <option value="fixed_wing">Fixed-wing</option>
          <option value="gyro_side_by_side">Gyrocopter — Side-by-side</option>
          <option value="gyro_tandem">Gyrocopter — Tandem</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Bot aliases <span style="color:var(--muted);font-weight:400;text-transform:none">(comma-separated, lowercase)</span></label>
      <input id="ac-aliases" type="text" placeholder="my plane,myplane,mp100"/>
    </div>
    <div class="field-row">
      <div class="field"><label>Empty Weight (kg)</label><input id="ac-empty-weight" type="number" step="0.1" placeholder="290"/></div>
      <div class="field"><label>Max Passengers</label><input id="ac-max-pax" type="number" step="1" min="0" max="4" placeholder="1"/></div>
    </div>

    <hr class="divider"/>
    <div class="form-title">Fuel</div>
    <div class="field-row">
      <div class="field"><label>Cruise (L/h)</label><input id="ac-fuel-cruise" type="number" step="0.1" placeholder="20"/></div>
      <div class="field"><label>Reserve (L)</label><input id="ac-fuel-reserve" type="number" step="0.1" placeholder="10"/></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Tank capacity (L)</label><input id="ac-fuel-cap" type="number" step="0.1" placeholder="98"/></div>
      <div class="field"><label>Density (kg/L)</label><input id="ac-fuel-density" type="number" step="0.01" placeholder="0.72"/></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Start/taxi (L)</label><input id="ac-fuel-start" type="number" step="0.1" placeholder="3"/></div>
      <div class="field"><label>Climb (L)</label><input id="ac-fuel-climb" type="number" step="0.1" placeholder="5"/></div>
    </div>

    <!-- ── Fixed-wing only ── -->
    <div id="ac-fw-section" style="display:none">
      <hr class="divider"/>
      <div class="form-title">Weight &amp; Balance — Fixed-wing</div>
      <div class="field-row">
        <div class="field"><label>Empty lever (m)</label><input id="ac-empty-lever" type="number" step="0.001" placeholder="0.439"/></div>
        <div class="field"><label>Fuel lever (m)</label><input id="ac-fuel-lever" type="number" step="0.001" placeholder="0.325"/></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Baggage lever (m)</label><input id="ac-bag-lever" type="number" step="0.001" placeholder="1.3"/></div>
        <div class="field"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>CG min at ref mass (m)</label><input id="ac-cg-min" type="number" step="0.001" placeholder="0.427"/></div>
        <div class="field"><label>CG max at ref mass (m)</label><input id="ac-cg-max" type="number" step="0.001" placeholder="0.515"/></div>
      </div>
      <div class="field">
        <label>CG Envelope — points (mass kg / CG mm)</label>
        <div id="ac-env-list"></div>
        <button class="btn btn-add btn-full" style="margin-top:6px" onclick="addEnvPoint()">+ Add Point</button>
      </div>
    </div>

    <!-- ── Gyrocopter common ── -->
    <div id="ac-gyro-section" style="display:none">
      <hr class="divider"/>
      <div class="form-title">Weight &amp; Balance — Gyrocopter</div>
      <div class="field-row">
        <div class="field"><label>MTOW (kg)</label><input id="ac-mtow" type="number" step="0.1" placeholder="560"/></div>
        <div class="field"><label>Max baggage (kg)</label><input id="ac-max-bag" type="number" step="0.1" placeholder="10"/></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Total cockpit min (kg)</label><input id="ac-cmin" type="number" step="0.1" placeholder="65"/></div>
        <div class="field"><label>Total cockpit max (kg)</label><input id="ac-cmax" type="number" step="0.1" placeholder="200"/></div>
      </div>
    </div>

    <!-- ── Side-by-side extra ── -->
    <div id="ac-sbs-section" style="display:none">
      <div class="field">
        <label>Max seat weight — both seats (kg)</label>
        <input id="ac-max-seat" type="number" step="0.1" placeholder="110"/>
      </div>
    </div>

    <!-- ── Tandem extra ── -->
    <div id="ac-tandem-section" style="display:none">
      <div class="field-row">
        <div class="field"><label>Front seat max (kg)</label><input id="ac-front-max" type="number" step="0.1" placeholder="125"/></div>
        <div class="field"><label>Front seat min (kg)</label><input id="ac-front-min" type="number" step="0.1" placeholder="60"/></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Aft seat max (kg)</label><input id="ac-aft-max" type="number" step="0.1" placeholder="129"/></div>
        <div class="field"><label>Nose penalty factor</label><input id="ac-nose-pen" type="number" step="0.1" placeholder="3"/></div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:-6px;margin-bottom:10px">
        Nose penalty: each kg of nose baggage reduces front seat max by this factor
      </div>
    </div>

    <hr class="divider"/>
    <button class="btn btn-primary" onclick="saveAircraft()">Save Aircraft</button>
    <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="toggleAcForm(false)">Cancel</button>
  </div>

  <div class="section-header">
    <span class="section-count" id="ac-count"></span>
    <button class="btn btn-add btn-sm" onclick="toggleAcForm(true)">+ Add</button>
  </div>
  <div id="ac-list"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';

// ── Tab switching ─────────────────────────────────────────────────────────────
const TAB_NAMES = ['airports','passengers','aircraft'];
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', TAB_NAMES[i] === name));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  if (name === 'airports') loadAirports();
  else if (name === 'passengers') loadPassengers();
  else loadAircraft();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = type === 'ok' ? '✓ ' + msg : '✗ ' + msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Airports ──────────────────────────────────────────────────────────────────
let airports = [];

async function loadAirports() {
  const res = await fetch(`${API}/airports`);
  airports = await res.json();
  document.getElementById('airport-count').textContent = `${airports.length} airports`;
  const el = document.getElementById('airport-list');
  if (!airports.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🛬</div>No airports yet</div>';
    return;
  }
  el.innerHTML = airports.map(a => `
    <div class="card" id="card-${a.icao}">
      <div class="card-header" onclick="toggleCard('${a.icao}')">
        <div class="card-title">
          <span class="card-badge icao">${a.icao}</span>
          ${a.name || a.icao}
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">
        <div class="info-row"><span class="info-label">Elevation</span><span class="info-val">${a.elevation_ft} ft</span></div>
        ${a.lat != null ? `<div class="info-row"><span class="info-label">Coordinates</span><span class="info-val">${a.lat?.toFixed(4)}° / ${a.lon?.toFixed(4)}°</span></div>` : ''}
        ${a.runways.length ? `
          <div style="margin-top:10px;font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px">Runways</div>
          ${a.runways.map(r => `
            <div class="runway-row">
              <span class="rw-num">RWY ${r.runway}</span>
              <span class="info-label">Surface</span><span>${r.surface}</span>
              <span class="info-label">TORA</span><span>${r.tora} m</span>
              <span class="info-label">LDA</span><span>${r.lda} m</span>
            </div>`).join('')}
        ` : '<div style="color:var(--muted);font-size:13px;margin-top:8px">No runways</div>'}
        <div class="card-actions">
          <button class="btn btn-ghost btn-sm" onclick="editAirport('${a.icao}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteAirport('${a.icao}')">Delete</button>
        </div>
      </div>
    </div>`).join('');
}

function toggleCard(id) {
  document.getElementById('card-'+id)?.classList.toggle('open');
}

function toggleAirportForm(show) {
  document.getElementById('airport-add').style.display = show ? 'block' : 'none';
  if (show) {
    document.getElementById('a-icao').value = '';
    document.getElementById('a-elev').value = '';
    document.getElementById('a-name').value = '';
    document.getElementById('a-lat').value = '';
    document.getElementById('a-lon').value = '';
    document.getElementById('runway-list').innerHTML = '';
    addRunwayField();
    document.getElementById('a-icao').focus();
  }
}

function editAirport(icao) {
  const a = airports.find(x => x.icao === icao);
  if (!a) return;
  toggleAirportForm(true);
  document.getElementById('a-icao').value = a.icao;
  document.getElementById('a-elev').value = a.elevation_ft;
  document.getElementById('a-name').value = a.name || '';
  document.getElementById('a-lat').value = a.lat || '';
  document.getElementById('a-lon').value = a.lon || '';
  document.getElementById('runway-list').innerHTML = '';
  a.runways.forEach(r => addRunwayField(r));
}

let rwCount = 0;
function addRunwayField(data = {}) {
  const id = ++rwCount;
  const div = document.createElement('div');
  div.className = 'runway-entry';
  div.id = 'rw-'+id;
  div.innerHTML = `
    <div class="runway-entry-header">
      <span class="runway-entry-title">Runway</span>
      <button class="btn btn-danger btn-sm" onclick="document.getElementById('rw-${id}').remove()">Remove</button>
    </div>
    <div class="field-row">
      <div class="field"><label>Designator</label><input class="rw-des" type="text" placeholder="07" value="${data.runway||''}"/></div>
      <div class="field"><label>Surface</label>
        <select class="rw-surf">
          <option value="asphalt" ${data.surface==='asphalt'?'selected':''}>Asphalt</option>
          <option value="grass" ${data.surface==='grass'?'selected':''}>Grass</option>
          <option value="concrete" ${data.surface==='concrete'?'selected':''}>Concrete</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>TORA (m)</label><input class="rw-tora" type="number" placeholder="800" value="${data.tora||''}"/></div>
      <div class="field"><label>LDA (m)</label><input class="rw-lda" type="number" placeholder="750" value="${data.lda||''}"/></div>
    </div>`;
  document.getElementById('runway-list').appendChild(div);
}

async function saveAirport() {
  const icao = document.getElementById('a-icao').value.trim().toUpperCase();
  const elev = parseFloat(document.getElementById('a-elev').value);
  if (!icao || icao.length !== 4 || isNaN(elev)) {
    toast('ICAO (4 letters) and elevation required', 'err'); return;
  }
  const runways = [];
  document.querySelectorAll('.runway-entry').forEach(el => {
    const des = el.querySelector('.rw-des').value.trim();
    const surf = el.querySelector('.rw-surf').value;
    const tora = parseFloat(el.querySelector('.rw-tora').value);
    const lda = parseFloat(el.querySelector('.rw-lda').value);
    if (des && !isNaN(tora) && !isNaN(lda)) runways.push({runway:des, surface:surf, tora, lda});
  });
  const lat = parseFloat(document.getElementById('a-lat').value) || null;
  const lon = parseFloat(document.getElementById('a-lon').value) || null;
  const name = document.getElementById('a-name').value.trim() || null;

  try {
    await fetch(`${API}/airports`, {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({icao, elevation_ft: elev, name, lat, lon, runways})});
    toast(`${icao} saved`);
    toggleAirportForm(false);
    loadAirports();
  } catch(e) { toast('Save failed', 'err'); }
}

async function deleteAirport(icao) {
  if (!confirm(`Delete ${icao}?`)) return;
  await fetch(`${API}/airports/${icao}`, {method:'DELETE'});
  toast(`${icao} deleted`);
  loadAirports();
}

// ── Passengers ────────────────────────────────────────────────────────────────
let passengers = [];

async function loadPassengers() {
  const res = await fetch(`${API}/passengers`);
  passengers = await res.json();
  document.getElementById('pax-count').textContent = `${passengers.length} passengers`;
  const el = document.getElementById('pax-list');
  if (!passengers.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">👤</div>No passengers yet</div>';
    return;
  }
  el.innerHTML = passengers.map(p => `
    <div class="card" id="card-pax-${p.name}">
      <div class="card-header" onclick="toggleCard('pax-${p.name}')">
        <div class="card-title">👤 ${p.name}</div>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">
        <div class="info-row"><span class="info-label">Weight</span><span class="info-val">${p.weight} kg</span></div>
        <div class="info-row"><span class="info-label">Height</span><span class="info-val">${p.height} cm</span></div>
        <div class="card-actions">
          <button class="btn btn-ghost btn-sm" onclick="editPassenger('${p.name}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deletePassenger('${p.name}')">Delete</button>
        </div>
      </div>
    </div>`).join('');
}

function togglePaxForm(show) {
  document.getElementById('pax-add').style.display = show ? 'block' : 'none';
  if (show) {
    document.getElementById('p-name').value = '';
    document.getElementById('p-weight').value = '';
    document.getElementById('p-height').value = '';
    document.getElementById('p-name').focus();
  }
}

function editPassenger(name) {
  const p = passengers.find(x => x.name === name);
  if (!p) return;
  togglePaxForm(true);
  document.getElementById('p-name').value = p.name;
  document.getElementById('p-weight').value = p.weight;
  document.getElementById('p-height').value = p.height;
}

async function savePassenger() {
  const name = document.getElementById('p-name').value.trim();
  const weight = parseFloat(document.getElementById('p-weight').value);
  const height = parseFloat(document.getElementById('p-height').value);
  if (!name || isNaN(weight) || isNaN(height)) {
    toast('All fields required', 'err'); return;
  }
  try {
    await fetch(`${API}/passengers`, {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, weight, height})});
    toast(`${name} saved`);
    togglePaxForm(false);
    loadPassengers();
  } catch(e) { toast('Save failed', 'err'); }
}

async function deletePassenger(name) {
  if (!confirm(`Delete ${name}?`)) return;
  await fetch(`${API}/passengers/${name}`, {method:'DELETE'});
  toast(`${name} deleted`);
  loadPassengers();
}

// ── Aircraft ──────────────────────────────────────────────────────────────────
let aircraftList = [];

const AC_TYPE_LABELS = {
  fixed_wing: 'Fixed-wing',
  gyro_side_by_side: 'Gyro — Side-by-side',
  gyro_tandem: 'Gyro — Tandem',
};

function onAcTypeChange() {
  const t = document.getElementById('ac-type').value;
  document.getElementById('ac-fw-section').style.display    = t === 'fixed_wing'        ? 'block' : 'none';
  document.getElementById('ac-gyro-section').style.display  = t.startsWith('gyro')      ? 'block' : 'none';
  document.getElementById('ac-sbs-section').style.display   = t === 'gyro_side_by_side' ? 'block' : 'none';
  document.getElementById('ac-tandem-section').style.display= t === 'gyro_tandem'       ? 'block' : 'none';
}

let envCount = 0;
function addEnvPoint(data = {}) {
  const id = ++envCount;
  const div = document.createElement('div');
  div.className = 'runway-entry';
  div.id = 'env-'+id;
  div.innerHTML = `
    <div class="runway-entry-header">
      <span class="runway-entry-title">Point ${id}</span>
      <button class="btn btn-danger btn-sm" onclick="document.getElementById('env-${id}').remove()">Remove</button>
    </div>
    <div class="field-row">
      <div class="field"><label>Mass (kg)</label><input class="env-mass" type="number" step="1" placeholder="560" value="${data.mass_kg||''}"/></div>
      <div class="field"><label>CG (mm)</label><input class="env-cg" type="number" step="1" placeholder="240" value="${data.cg_mm||''}"/></div>
    </div>`;
  document.getElementById('ac-env-list').appendChild(div);
}

async function loadAircraft() {
  const res = await fetch(`${API}/aircraft`);
  aircraftList = await res.json();
  document.getElementById('ac-count').textContent = `${aircraftList.length} aircraft`;
  const el = document.getElementById('ac-list');
  if (!aircraftList.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">✈️</div>No aircraft yet</div>';
    return;
  }
  el.innerHTML = aircraftList.map(ac => {
    const typeLabel = AC_TYPE_LABELS[ac.type] || ac.type;
    const isGyro = ac.type.startsWith('gyro');
    const isTandem = ac.type === 'gyro_tandem';
    const rows = [
      `<div class="info-row"><span class="info-label">Type</span><span class="info-val">${typeLabel}</span></div>`,
      `<div class="info-row"><span class="info-label">Empty weight</span><span class="info-val">${ac.empty_weight} kg</span></div>`,
      ac.fuel_capacity_liters != null ? `<div class="info-row"><span class="info-label">Fuel tank</span><span class="info-val">${ac.fuel_capacity_liters} L</span></div>` : '',
      `<div class="info-row"><span class="info-label">Cruise fuel</span><span class="info-val">${ac.fuel_cruise_per_hour} L/h · reserve ${ac.fuel_reserve} L</span></div>`,
      isGyro && ac.mtow != null ? `<div class="info-row"><span class="info-label">MTOW</span><span class="info-val">${ac.mtow} kg</span></div>` : '',
      isGyro && !isTandem && ac.max_seat_weight != null ? `<div class="info-row"><span class="info-label">Max seat weight</span><span class="info-val">${ac.max_seat_weight} kg each</span></div>` : '',
      isTandem && ac.max_seat_weight != null ? `<div class="info-row"><span class="info-label">Front seat</span><span class="info-val">min ${ac.min_front_seat_weight||'—'} / max ${ac.max_seat_weight} kg${ac.nose_penalty_factor ? ` (−${ac.nose_penalty_factor}×nose)` : ''}</span></div>` : '',
      isTandem && ac.max_aft_seat_weight != null ? `<div class="info-row"><span class="info-label">Aft seat max</span><span class="info-val">${ac.max_aft_seat_weight} kg</span></div>` : '',
      ac.aliases ? `<div class="info-row"><span class="info-label">Bot aliases</span><span class="info-val" style="font-size:12px;color:var(--muted)">${ac.aliases}</span></div>` : '',
    ].filter(Boolean).join('');
    return `
    <div class="card" id="card-ac-${ac.code}">
      <div class="card-header" onclick="toggleCard('ac-${ac.code}')">
        <div class="card-title">✈ ${ac.name} <span class="card-badge">${typeLabel}</span></div>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">
        ${rows}
        <div class="card-actions">
          <button class="btn btn-ghost btn-sm" onclick="editAircraft('${ac.code}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteAircraft('${ac.code}')">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleAcForm(show, title = 'Add Aircraft') {
  document.getElementById('ac-add').style.display = show ? 'block' : 'none';
  document.getElementById('ac-form-title').textContent = title;
  if (show) {
    ['ac-code','ac-name','ac-aliases','ac-empty-weight','ac-max-pax',
     'ac-fuel-cruise','ac-fuel-reserve','ac-fuel-cap','ac-fuel-density',
     'ac-fuel-start','ac-fuel-climb','ac-empty-lever','ac-fuel-lever',
     'ac-bag-lever','ac-cg-min','ac-cg-max','ac-mtow','ac-max-bag',
     'ac-cmin','ac-cmax','ac-max-seat','ac-front-max','ac-front-min',
     'ac-aft-max','ac-nose-pen']
      .forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
    document.getElementById('ac-type').value = 'fixed_wing';
    document.getElementById('ac-env-list').innerHTML = '';
    envCount = 0;
    onAcTypeChange();
    document.getElementById('ac-code').focus();
  }
}

function editAircraft(code) {
  const ac = aircraftList.find(x => x.code === code);
  if (!ac) return;
  toggleAcForm(true, 'Edit Aircraft');
  const set = (id, val) => { const el = document.getElementById(id); if(el && val != null) el.value = val; };
  set('ac-code', ac.code);
  set('ac-name', ac.name);
  set('ac-aliases', ac.aliases || '');
  set('ac-empty-weight', ac.empty_weight);
  set('ac-max-pax', ac.max_passengers);
  set('ac-fuel-cruise', ac.fuel_cruise_per_hour);
  set('ac-fuel-reserve', ac.fuel_reserve);
  set('ac-fuel-cap', ac.fuel_capacity_liters);
  set('ac-fuel-density', ac.fuel_density);
  set('ac-fuel-start', ac.fuel_start_roll);
  set('ac-fuel-climb', ac.fuel_climb);
  set('ac-empty-lever', ac.empty_lever);
  set('ac-fuel-lever', ac.fuel_lever);
  set('ac-bag-lever', ac.baggage_lever);
  set('ac-cg-min', ac.cg_line_min);
  set('ac-cg-max', ac.cg_line_max);
  set('ac-mtow', ac.mtow);
  set('ac-max-bag', ac.max_baggage_weight ?? ac.max_storage_weight);
  set('ac-cmin', ac.min_cockpit_weight);
  set('ac-cmax', ac.max_cockpit_weight);
  set('ac-max-seat', ac.max_seat_weight);
  set('ac-front-max', ac.max_seat_weight);
  set('ac-front-min', ac.min_front_seat_weight);
  set('ac-aft-max', ac.max_aft_seat_weight);
  set('ac-nose-pen', ac.nose_penalty_factor);
  document.getElementById('ac-type').value = ac.type;
  document.getElementById('ac-env-list').innerHTML = '';
  envCount = 0;
  (ac.cg_envelope || []).forEach(p => addEnvPoint(p));
  onAcTypeChange();
}

async function saveAircraft() {
  const code = document.getElementById('ac-code').value.trim().toLowerCase().replace(/\s+/g,'_');
  const name = document.getElementById('ac-name').value.trim();
  const type = document.getElementById('ac-type').value;
  const empty_weight = parseFloat(document.getElementById('ac-empty-weight').value);
  if (!code || !name || isNaN(empty_weight)) {
    toast('Code, name and empty weight required', 'err'); return;
  }
  const g = id => { const v = parseFloat(document.getElementById(id)?.value); return isNaN(v) ? null : v; };
  const isGyro = type.startsWith('gyro');
  const isTandem = type === 'gyro_tandem';
  const isSbs = type === 'gyro_side_by_side';
  const body = {
    code, name, type,
    aliases: document.getElementById('ac-aliases').value.trim() || null,
    empty_weight,
    empty_lever:  g('ac-empty-lever') ?? 0,
    fuel_start_roll: g('ac-fuel-start') ?? 0,
    fuel_climb:   g('ac-fuel-climb') ?? 0,
    fuel_cruise_per_hour: g('ac-fuel-cruise'),
    fuel_reserve: g('ac-fuel-reserve'),
    fuel_density: g('ac-fuel-density') ?? 0.72,
    fuel_lever:   g('ac-fuel-lever') ?? 0,
    baggage_lever:g('ac-bag-lever') ?? 0,
    max_passengers: parseInt(document.getElementById('ac-max-pax').value) || 1,
    fuel_capacity_liters: g('ac-fuel-cap'),
    cg_line_min:  type === 'fixed_wing' ? g('ac-cg-min') : null,
    cg_line_max:  type === 'fixed_wing' ? g('ac-cg-max') : null,
    mtow:         isGyro ? g('ac-mtow') : null,
    max_seat_weight:      isSbs ? g('ac-max-seat') : (isTandem ? g('ac-front-max') : null),
    max_aft_seat_weight:  isTandem ? g('ac-aft-max') : null,
    max_cockpit_weight:   isGyro ? g('ac-cmax') : null,
    min_cockpit_weight:   isGyro ? g('ac-cmin') : null,
    max_baggage_weight:   isGyro ? g('ac-max-bag') : null,
    min_front_seat_weight:isTandem ? g('ac-front-min') : null,
    nose_penalty_factor:  isTandem ? g('ac-nose-pen') : null,
    cg_envelope: [],
  };
  if (type === 'fixed_wing') {
    document.querySelectorAll('#ac-env-list .runway-entry').forEach(el => {
      const mass = parseFloat(el.querySelector('.env-mass').value);
      const cg   = parseFloat(el.querySelector('.env-cg').value);
      if (!isNaN(mass) && !isNaN(cg)) body.cg_envelope.push({mass_kg: mass, cg_mm: cg});
    });
  }
  try {
    const res = await fetch(`${API}/aircraft`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    if (!res.ok) throw new Error(await res.text());
    toast(`${name} saved`);
    toggleAcForm(false);
    loadAircraft();
  } catch(e) { toast('Save failed: ' + e.message, 'err'); }
}

async function deleteAircraft(code) {
  const ac = aircraftList.find(x => x.code === code);
  if (!confirm(`Delete ${ac?.name || code}?`)) return;
  await fetch(`${API}/aircraft/${code}`, {method:'DELETE'});
  toast(`${ac?.name || code} deleted`);
  loadAircraft();
}

// ── Init ──────────────────────────────────────────────────────────────────────
const _hash = location.hash.replace('#','');
if (_hash === 'sec-passengers') showTab('passengers');
else if (_hash === 'sec-aircraft') showTab('aircraft');
else loadAirports();
</script>
</body>
</html>
